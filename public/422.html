<!doctype html>
<html lang="ht">
<head>
  <title>Aksyon refize — Zèllus</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --haiti-charcoal: #2E2E38;
      --haiti-olive: #5D6345;
      --haiti-gold: #C5A059;
      --haiti-mint: #E8EDE0;
      --haiti-cream: #F7F4E3;
    }
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    body {
      background: var(--haiti-cream);
      color: var(--haiti-charcoal);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .error-card {
      text-align: center;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
    }
    .error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--haiti-charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .error-icon span {
      font-size: 36px;
      line-height: 1;
    }
    .error-code {
      font-size: 48px;
      font-weight: 900;
      color: var(--haiti-gold);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--haiti-charcoal);
      margin-bottom: 12px;
    }
    .error-message {
      font-size: 14px;
      color: var(--haiti-olive);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--haiti-charcoal);
      color: var(--haiti-gold);
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .error-btn:hover { opacity: 0.85; }
    .error-footer {
      margin-top: 32px;
      font-size: 11px;
      color: rgba(93,99,69,0.5);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <span>🚫</span>
    </div>
    <div class="error-code">422</div>
    <div class="error-title">Aksyon refize</div>
    <div class="error-message">
      Chanjman ou te vle fè a pa aksepte. Ou ka pa gen pèmisyon pou fè aksyon sa a.
    </div>
    <a href="/" class="error-btn">
      ← Retounen Lakay
    </a>
    <div class="error-footer">Zèllus</div>
  </div>
</body>
</html>
